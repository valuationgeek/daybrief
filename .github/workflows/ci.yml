name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      # The offline test suite only touches light modules (preprocessor,
      # scorer, config) — no torch/transformers install needed for CI.
      - run: pip install ruff pytest pyyaml
      - run: ruff check .
      - run: pytest -q
